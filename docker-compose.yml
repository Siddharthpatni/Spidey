# Spidey — sandboxed run. The agent gets full autonomy (no approval prompts,
# full-disk access) INSIDE the container, but the container can only see the
# ./workspace folder from your real disk. Your home, documents and everything
# else are invisible to it, so it cannot delete or harm your data.
#
#   SPIDEY_TOKEN=$(openssl rand -hex 16) docker compose up --build
#   → open http://localhost:8000/?token=<that token>
#
# Memory, the knowledge graph and the platform DB persist in a Docker-managed
# volume (spidey-home) — isolated from your host filesystem too.

services:
  spidey:
    build: .
    container_name: spidey
    ports:
      - "8000:8000"
    environment:
      # A token is required because the server binds 0.0.0.0 inside the container.
      SPIDEY_TOKEN: "${SPIDEY_TOKEN:-spidey-sandbox}"
      # Reach the Ollama running on your Mac/host (Docker Desktop maps this name).
      OLLAMA_HOST: "http://host.docker.internal:11434"
      SPIDEY_LLM_PROVIDER: "ollama"
      SPIDEY_LLM_MODEL: "${SPIDEY_MODEL:-gemma4:12b}"
    volumes:
      # The ONLY host folder the agent can touch. Put files here to work on them;
      # nothing outside this folder is reachable from inside the sandbox.
      - ./workspace:/workspace
      # Memory / knowledge graph / platform.db live in an isolated Docker volume.
      - spidey-home:/home/spidey/.spidey
    extra_hosts:
      # Lets the container reach the host's Ollama on Linux too (no-op on Desktop).
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # Optional guardrails — uncomment to cap what the sandbox can consume:
    # mem_limit: 6g
    # cpus: 4
    # pids_limit: 512

volumes:
  spidey-home:
